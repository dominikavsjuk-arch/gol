<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Видео Сайт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: black; font-family: sans-serif; }
        
        /* Видео на весь экран */
        #myVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%; 
            min-height: 100%;
            z-index: -1;
        }

        /* Контент поверх видео */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4); /* Затемнение, чтобы кнопки было видно */
        }

        .btn-play {
            padding: 20px 40px;
            font-size: 24px;
            color: white;
            background: #ff0000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            transition: 0.3s;
        }

        .btn-play:hover { transform: scale(1.1); background: #cc0000; }
    </style>
</head>
<body>

    <video id="myVideo" loop>
        <source src="video.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>

    <div class="overlay" id="overlay">
        <button class="btn-play" onclick="playVideo()">ЗАПУСТИТЬ ВИДЕО 🎬</button>
    </div>

    <script>
        function playVideo() {
            var video = document.getElementById("myVideo");
            var overlay = document.getElementById("overlay");
            
            video.play(); // Запускаем видео
            overlay.style.display = "none"; // Прячем кнопку
        }
    </script>

</body>
</html>
