<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Супер Форум</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; padding: 20px; }
        header { background: #1f1f1f; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .post { background: #252525; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #007bff; }
        .post h3 { margin: 0; color: #007bff; }
        .form-section { background: #1f1f1f; padding: 20px; border-radius: 10px; margin-top: 30px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: none; color: white; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<header>
    <h1>Добро пожаловать на мой форум! 🚀</h1>
    <p>Общаемся, делимся кодом и играем в Roblox.</p>
</header>

<div id="forum-posts">
    <div class="post">
        <h3>Админ</h3>
        <p>Привет всем! Это первая тема на моем новом форуме.</p>
    </div>
    <div class="post">
        <h3>Друг_1</h3>
        <p>Вау, крутой дизайн! Как ты это сделал?</p>
    </div>
</div>

<div class="form-section">
    <h2>Написать сообщение:</h2>
    <input type="text" placeholder="Твоё имя">
    <textarea rows="4" placeholder="Текст сообщения..."></textarea>
    <button onclick="alert('Для работы отправки нужен бэкенд (Python), но дизайн готов!')">Отправить</button>
</div>

</body>
</html>
